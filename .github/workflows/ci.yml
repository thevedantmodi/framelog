name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    # ubuntu-latest: no exiftool, diskutil, pmset, pgrep, or rclone — the exact
    # clean-room that every injectable-binary-path pattern in this codebase
    # (FindExiftool, FindDiskutil, FindPmset, FindPgrep, FindRclone) was built
    # against. Switching to macos-latest would silently allow tests to pass via
    # real system binaries instead of the fake scripts, defeating the guarantee.
    # git and gcc are pre-installed (needed by gitops and the cgo sqlite3 driver).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./... -race -cover
